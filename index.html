    #root { min-height: 100vh; }

    /* Shooting stars */
    .shooting-star {
      position: absolute;
      pointer-events: none;
      width: 160px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,1) 80%,
        rgba(255,255,255,0) 100%
      );
      filter: drop-shadow(0 0 4px rgba(180,220,255,0.9));
    }
    .shooting-star::before {
      content: '';
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 8px 3px rgba(180,220,255,0.8), 0 0 16px 6px rgba(100,180,255,0.3);
    }
    .shooting-star:nth-child(1) {
      top: 10%; left: 5%;
      animation: shoot1 5.5s ease-in infinite;
      animation-delay: 0.5s;
    }
    .shooting-star:nth-child(2) {
      top: 22%; left: 38%;
      animation: shoot2 7s ease-in infinite;
      animation-delay: 3.2s;
    }
    .shooting-star:nth-child(3) {
      top: 6%; left: 62%;
      animation: shoot3 6.2s ease-in infinite;
      animation-delay: 1.6s;
    }
    @keyframes shoot1 {
      0%   { opacity: 0;   transform: rotate(28deg) translateX(0); }
      6%   { opacity: 1;   transform: rotate(28deg) translateX(40px); }
      80%  { opacity: 0.7; transform: rotate(28deg) translateX(320px); }
      100% { opacity: 0;   transform: rotate(28deg) translateX(380px); }
    }
    @keyframes shoot2 {
      0%   { opacity: 0;   transform: rotate(22deg) translateX(0); }
      6%   { opacity: 1;   transform: rotate(22deg) translateX(40px); }
      80%  { opacity: 0.7; transform: rotate(22deg) translateX(300px); }
      100% { opacity: 0;   transform: rotate(22deg) translateX(360px); }
    }
    @keyframes shoot3 {
      0%   { opacity: 0;   transform: rotate(32deg) translateX(0); }
      6%   { opacity: 1;   transform: rotate(32deg) translateX(40px); }
      80%  { opacity: 0.7; transform: rotate(32deg) translateX(340px); }
      100% { opacity: 0;   transform: rotate(32deg) translateX(400px); }
    }

    body::before {
      content: '';
      position: fixed;

const Nav = ({ accent }) => {
  const [scrolled, setScrolled] = React.useState(false);
  const [active, setActive] = React.useState('hero');

  React.useEffect(() => {
    const onScroll = () => {
      setScrolled(window.scrollY > 40);
      const sections = ['hero','about','skills','experience','education','contact'];
      for (const id of [...sections].reverse()) {
        const el = document.getElementById(id);
        if (el && window.scrollY >= el.offsetTop - 120) { setActive(id); break; }
      }
    };
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

      [30,60],[30,65],[30,70],[30,75],[30,80],[30,85],[30,90],[30,95],[30,100],
      [35,60],[35,65],[35,70],[35,75],[35,80],[35,85],[35,90],[35,95],[35,100],
      [40,60],[40,65],[40,70],[40,75],[40,80],[40,85],[40,90],[40,95],
      [45,60],[45,65],[45,70],[45,75],[45,80],[45,85],[45,90],[45,95],[45,100],
      [50,65],[50,70],[50,75],[50,80],[50,85],[50,90],[50,95],[50,100],
      [55,70],[55,75],[55,80],[55,85],[55,90],[55,95],[55,100],
      [25,65],[25,70],[25,75],[25,80],[25,85],[25,90],[25,95],[25,100],[25,105],
      [20,75],[20,80],[20,85],[20,90],[20,95],[20,100],[20,105],
      [15,75],[15,80],[15,85],[15,90],[15,95],[15,100],[15,105],
      [10,75],[10,80],[10,85],[10,90],[10,95],[10,100],
      // ── Australia coast + interior ──
      [-14,128],[-12,132],[-12,136],[-13,142],[-16,145],[-20,148],
      [-25,152],[-28,153],[-32,152],[-35,150],[-38,147],[-38,145],
      [-38,142],[-38,140],[-36,137],[-32,134],[-28,114],[-22,114],
      [-18,118],[-15,128],[-14,132],[-20,120],[-25,128],[-30,115],
      [-34,116],[-35,118],[-34,122],[-32,122],[-28,122],[-24,118],
      [-20,130],[-20,135],[-20,140],[-25,130],[-25,135],[-25,140],
      [-28,130],[-28,135],[-28,140],[-30,125],[-30,130],[-30,135],
      // ── Russia / Siberia coast + interior ──
      [55,65],[56,60],[58,62],[60,62],[62,65],[65,65],[68,65],[70,72],
      [72,80],[72,95],[70,100],[68,105],[65,110],[62,115],[60,120],
      [58,125],[55,125],[52,128],[55,132],[58,138],[60,140],[62,142],
      [65,142],[68,146],[68,160],[65,165],[62,168],[60,165],[58,162],
      [60,65],[60,70],[60,75],[60,80],[60,85],[60,90],[60,95],[60,100],
      [62,70],[62,75],[62,80],[62,85],[62,90],[62,95],[62,100],[62,105],
      [64,70],[64,75],[64,80],[64,85],[64,90],[64,95],[64,100],[64,105],
      [66,70],[66,75],[66,80],[66,85],[66,90],[66,95],[66,100],
      [68,80],[68,85],[68,90],[68,95],[68,100],
    ];

    const cities = [
      { name:'New York',    lat:40.7,  lon:-74.0 },
      { name:'London',      lat:51.5,  lon:-0.1  },
      { name:'Moscow',      lat:55.7,  lon:37.6  },
      { name:'Beijing',     lat:39.9,  lon:116.4 },
      { name:'Tokyo',       lat:35.7,  lon:139.7 },
      { name:'Sydney',      lat:-33.9, lon:151.2 },
      { name:'São Paulo',   lat:-23.5, lon:-46.6 },
      { name:'Dubai',       lat:25.2,  lon:55.3  },
      { name:'Singapore',   lat:1.3,   lon:103.8 },
      { name:'Lagos',       lat:6.5,   lon:3.4   },
      { name:'Mumbai',      lat:19.1,  lon:72.9  },
      { name:'Seoul',       lat:37.6,  lon:126.9 },
      { name:'Paris',       lat:48.9,  lon:2.3   },
      { name:'Toronto',     lat:43.7,  lon:-79.4 },
      { name:'Cairo',       lat:30.0,  lon:31.2  },
      { name:'Castelfranco',lat:45.7,  lon:11.9, home:true },
    ];

    const toRad = d => d * Math.PI / 180;

    const project = (lat, lon, rot) => {
      const phi = toRad(90 - lat);
      const theta = toRad(lon) + rot;
      const sinPhi = Math.sin(phi);
      const x = R * sinPhi * Math.cos(theta);
      const y = R * Math.cos(phi);
      const z = R * sinPhi * Math.sin(theta);
      return { x: cx + x, y: cy - y, z, depth: (z + R) / (2 * R), visible: z > -R * 0.08 };
    };

    const arcPoint = (src, dst, t, rot) => {
      const lat = src.lat + (dst.lat - src.lat) * t;
      const lon = src.lon + (dst.lon - src.lon) * t;
      const lift = Math.sin(t * Math.PI) * 0.5;
      const phi = toRad(90 - lat);
      const theta = toRad(lon) + rot;
      const r = R * (1 + lift);
      const sinPhi = Math.sin(phi);
      return {
        x: cx + r * sinPhi * Math.cos(theta),
        y: cy - r * Math.cos(phi),
        z: r * sinPhi * Math.sin(theta),
      };
    };

    const spawnAttack = () => {
      const src = cities[Math.floor(Math.random() * cities.length)];
      let dst; do { dst = cities[Math.floor(Math.random() * cities.length)]; } while (dst === src);
      const palette = [accent, '#00b8ff', '#f43f5e', '#f59e0b', '#a78bfa'];
      state.attacks.push({
        src, dst, progress: 0,
        speed: 0.003 + Math.random() * 0.004,
        color: palette[Math.floor(Math.random() * palette.length)],
        impacted: false,
      });
    };

    const draw = (ts) => {
      ctx.clearRect(0, 0, W, H);
      if (!dragRef.current.active) {
        state.velocity *= 0.95;
        state.rotation += state.velocity + 0.0010;
      }
      const rot = state.rotation;

      // ── STARS ──
      state.stars.forEach(s => {
        const flicker = 0.5 + 0.5 * Math.sin(ts * 0.0006 + s.phase);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${0.15 + flicker * 0.35})`;
        ctx.fill();
      });



      // ── CLIP to globe ──
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.clip();

      // Globe body — deep dark
      const fill = ctx.createRadialGradient(cx - R*0.38, cy - R*0.38, R*0.04, cx, cy, R);
      fill.addColorStop(0,   'rgba(8,14,28,0.85)');
      fill.addColorStop(0.35,'rgba(4,8,18,0.95)');
      fill.addColorStop(1,   'rgba(1,3,9,0.99)');
      ctx.fillStyle = fill;
      ctx.fillRect(cx - R, cy - R, R*2, R*2);

      // ── SPECULAR HIGHLIGHT ──
      const spec = ctx.createRadialGradient(cx - R*0.38, cy - R*0.4, 0, cx - R*0.28, cy - R*0.3, R*0.7);
      spec.addColorStop(0,   'rgba(255,255,255,0.09)');
      spec.addColorStop(0.45,'rgba(100,160,255,0.03)');
      spec.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = spec;
      ctx.fillRect(cx - R, cy - R, R*2, R*2);

      // ── GRID ──
      for (let lat = -75; lat <= 75; lat += 15) {
        ctx.beginPath();
        let first = true;
        const isEq = lat === 0;
        for (let lon = -180; lon <= 180; lon += 2) {
          const p = project(lat, lon, rot);
          if (!p.visible) { first = true; continue; }
          first ? (ctx.moveTo(p.x, p.y), first = false) : ctx.lineTo(p.x, p.y);
        }
        ctx.strokeStyle = isEq ? `rgba(${ar},${ag},${ab},0.30)` : `rgba(${ar},${ag},${ab},0.08)`;
        ctx.lineWidth = isEq ? 0.9 : 0.4;
        ctx.stroke();
      }
      for (let lon = -180; lon < 180; lon += 20) {
        ctx.beginPath();
        let first = true;
        for (let lat = -80; lat <= 80; lat += 2) {
          const p = project(lat, lon, rot);
          if (!p.visible) { first = true; continue; }
          first ? (ctx.moveTo(p.x, p.y), first = false) : ctx.lineTo(p.x, p.y);
        }
        ctx.strokeStyle = `rgba(${ar},${ag},${ab},0.05)`;
        ctx.lineWidth = 0.4;
        ctx.stroke();
      }

      // ── CONTINENT DOTS ──
      DOTS.forEach(([lat, lon]) => {
        const p = project(lat, lon, rot);
        if (!p.visible) return;
        const alpha = 0.38 + p.depth * 0.58;
        const size  = 1.4 + p.depth * 1.8;
        ctx.beginPath();
        ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${ar},${ag},${ab},${alpha})`;
        ctx.fill();
      });

      ctx.restore(); // end clip

      // ── GLOBE BORDER ──
      ctx.save();
      ctx.shadowColor = accent;
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${ar},${ag},${ab},0.55)`;
      ctx.lineWidth = 1.8;
      ctx.stroke();
      ctx.restore();

      // ── RIM LIGHT (opposite side) ──
      const rim = ctx.createRadialGradient(cx + R*0.45, cy - R*0.45, R*0.15, cx, cy, R*1.02);
      rim.addColorStop(0,    'rgba(0,0,0,0)');
      rim.addColorStop(0.68, 'rgba(0,0,0,0)');
      rim.addColorStop(0.84, `rgba(0,184,255,0.18)`);
      rim.addColorStop(1,    `rgba(0,184,255,0.38)`);
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.fillStyle = rim;
      ctx.fill();

      // ── CITY MARKERS ──
      cities.forEach((city, i) => {
        const p = project(city.lat, city.lon, rot);
        if (!p.visible) return;
        const [cr, cg, cb] = city.home ? [255,210,60] : [ar,ag,ab];
        const basePhase = ts * 0.00095 + i * 2.1;

        // 3 expanding rings at staggered phases
        for (let ring = 0; ring < 3; ring++) {
          const phase = (basePhase + ring * (Math.PI * 2 / 3)) % (Math.PI * 2);
          const pct = phase / (Math.PI * 2);
          const ringR = 3 + pct * 20;
          const alpha = (1 - pct) * 0.6 * p.depth;
          if (alpha < 0.01) continue;
          ctx.beginPath();
          ctx.arc(p.x, p.y, ringR, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(${cr},${cg},${cb},${alpha})`;
          ctx.lineWidth = city.home ? 1.2 : 0.9;
          ctx.stroke();
        }

        // Core dot with glow
        const dotR = city.home ? 5 : 3.5;
        ctx.save();
        ctx.shadowColor = city.home ? `rgba(255,210,60,1)` : accent;
        ctx.shadowBlur = city.home ? 28 : 20;
        ctx.beginPath();
        ctx.arc(p.x, p.y, dotR * (0.6 + p.depth * 0.4), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${cr},${cg},${cb},1)`;
        ctx.fill();
        ctx.restore();
      });

      // ── SPAWN ATTACKS ──
      if (ts - state.lastAttack > 450 + Math.random()*350 && state.attacks.length < 10) {
        spawnAttack();
        state.lastAttack = ts;
      }

      // ── ATTACK ARCS — 2-pass: glow then core ──
      for (let i = state.attacks.length - 1; i >= 0; i--) {
        const atk = state.attacks[i];
        atk.progress += atk.speed;
        const [r2,g2,b2] = hex2rgb(atk.color.startsWith('#') ? atk.color : accent);
        const prog = Math.min(atk.progress, 1);
        const STEPS = 80;
        const headStep = Math.floor(prog * STEPS);
        const tailStep = Math.max(0, headStep - 28);

        // Pre-collect points
        const pts = [];
        for (let s = tailStep; s <= headStep; s++) {
          pts.push(arcPoint(atk.src, atk.dst, s / STEPS, rot));
        }
        if (pts.length < 2) { if (atk.progress >= 1.6) state.attacks.splice(i, 1); continue; }

        // Pass 1: glow halo
        ctx.save();
        ctx.shadowColor = atk.color;
        ctx.shadowBlur = 22;
        for (let s = 0; s < pts.length - 1; s++) {
          const a = (s / (pts.length - 1)) * 0.35;
          ctx.beginPath();
          ctx.moveTo(pts[s].x, pts[s].y);
          ctx.lineTo(pts[s+1].x, pts[s+1].y);
          ctx.strokeStyle = `rgba(${r2},${g2},${b2},${a})`;
          ctx.lineWidth = 5;
          ctx.stroke();
        }
        ctx.restore();

        // Pass 2: crisp core
        for (let s = 0; s < pts.length - 1; s++) {
          const a = (s / (pts.length - 1)) * 0.9;
          ctx.beginPath();
          ctx.moveTo(pts[s].x, pts[s].y);
          ctx.lineTo(pts[s+1].x, pts[s+1].y);
          ctx.strokeStyle = `rgba(${r2},${g2},${b2},${a})`;
          ctx.lineWidth = 1.8;
          ctx.stroke();
        }

        // Head dot with bloom
        if (atk.progress < 1) {
          const head = arcPoint(atk.src, atk.dst, atk.progress, rot);
          const fadeOut = 1 - Math.max(0, (atk.progress - 0.85) / 0.15);
          ctx.save();
          ctx.shadowColor = atk.color;
          ctx.shadowBlur = 32;
          ctx.beginPath();
          ctx.arc(head.x, head.y, 5.5, 0, Math.PI*2);
          ctx.fillStyle = `rgba(${r2},${g2},${b2},${fadeOut})`;
          ctx.fill();
          // White core
          ctx.shadowBlur = 0;
          ctx.beginPath();
          ctx.arc(head.x, head.y, 2, 0, Math.PI*2);
          ctx.fillStyle = `rgba(255,255,255,${fadeOut * 0.8})`;
          ctx.fill();
          ctx.restore();
        }

        // Trigger impact
        if (atk.progress >= 1 && !atk.impacted) {
          atk.impacted = true;
          const dst = project(atk.dst.lat, atk.dst.lon, rot);
          state.impacts.push({ x: dst.x, y: dst.y, color: atk.color, age: 0 });
        }

        if (atk.progress >= 1.6) state.attacks.splice(i, 1);
      }

      // ── IMPACT EXPLOSIONS ──
      for (let i = state.impacts.length - 1; i >= 0; i--) {
        const imp = state.impacts[i];
        imp.age++;
        const [r2,g2,b2] = hex2rgb(imp.color.startsWith('#') ? imp.color : accent);
        ctx.save();
        ctx.shadowColor = imp.color;
        ctx.shadowBlur = 14;
        for (let ring = 0; ring < 3; ring++) {
          const t = ((imp.age / 60) + ring * 0.33) % 1;
          const ringR = t * 38;
          const alpha = (1 - t) * 1.0;
          ctx.beginPath();
          ctx.arc(imp.x, imp.y, ringR, 0, Math.PI*2);
          ctx.strokeStyle = `rgba(${r2},${g2},${b2},${alpha})`;
          ctx.lineWidth = 1.6;
          ctx.stroke();
        }
        ctx.restore();
        if (imp.age > 60) state.impacts.splice(i, 1);
      }

      // ── HUD STATUS BAR ──
      const count = state.attacks.length;
      const fs = 10 * dpr;
      ctx.font = `600 ${fs}px 'JetBrains Mono', monospace`;
      const label = `◉ LIVE THREATS: ${String(count).padStart(2,'0')}`;
      const tw = ctx.measureText(label).width;
      const hx = cx - tw / 2 - 12*dpr;
      const hy = cy + R + 14*dpr;
      const hw = tw + 24*dpr;
      const hh = 22*dpr;

      ctx.fillStyle = 'rgba(4,8,16,0.75)';
      ctx.beginPath();
      if (ctx.roundRect) {
        ctx.roundRect(hx, hy, hw, hh, 4*dpr);
      } else {
        ctx.rect(hx, hy, hw, hh);
      }
      ctx.fill();
      ctx.strokeStyle = `rgba(${ar},${ag},${ab},0.3)`;
      ctx.lineWidth = 0.8;
      ctx.stroke();

      ctx.fillStyle = `rgba(${ar},${ag},${ab},0.92)`;
      ctx.fillText(label, hx + 12*dpr, hy + 15*dpr);

      animRef.current = requestAnimationFrame(draw);
    };

    animRef.current = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(animRef.current);
  }, [accent]);

  const handleMouseDown = (e) => {
    dragRef.current.active = true;
    dragRef.current.lastX = e.clientX;
    stateRef.current.velocity = 0;
  };
  const handleMouseMove = (e) => {
    if (!dragRef.current.active) return;
    const dx = e.clientX - dragRef.current.lastX;
    dragRef.current.lastX = e.clientX;
    stateRef.current.velocity = dx * 0.003;
    stateRef.current.rotation += dx * 0.003;
  };
  const handleMouseUp = () => { dragRef.current.active = false; };

  return (
    <canvas ref={canvasRef}
      onMouseDown={handleMouseDown}
      onMouseMove={handleMouseMove}
      onMouseUp={handleMouseUp}
      onMouseLeave={handleMouseUp}
      style={{
        position: 'absolute',
        top: '50%', right: '-2%',
        transform: 'translateY(-50%)',
        width: 'min(540px, 50vw)',
        height: 'min(600px, 55vw)',
        pointerEvents: 'auto',
        cursor: 'grab',
        opacity: 0.95,
        WebkitMaskImage: 'radial-gradient(ellipse 80% 85% at 62% 50%, black 35%, transparent 100%)',
        maskImage: 'radial-gradient(ellipse 80% 85% at 62% 50%, black 35%, transparent 100%)',
      }} />
  );
};

/* ── HERO ── */
const Hero = ({ accent }) => {
  const [typed, setTyped] = React.useState('');
  const [showCursor, setShowCursor] = React.useState(true);
  const phrases = ['Cybersecurity Specialist', 'Web Developer', 'Cloud Engineer', 'Problem Solver'];
  const phraseIdx = React.useRef(0);
  const charIdx = React.useRef(0);
  const deleting = React.useRef(false);

  React.useEffect(() => {
    let timeout;
    const tick = () => {
      const phrase = phrases[phraseIdx.current];
      if (!deleting.current) {
        charIdx.current++;
        setTyped(phrase.slice(0, charIdx.current));
        if (charIdx.current === phrase.length) {
          deleting.current = true;
          timeout = setTimeout(tick, 1800);
          return;
        }
      } else {
        charIdx.current--;
        setTyped(phrase.slice(0, charIdx.current));
        if (charIdx.current === 0) {
          deleting.current = false;
          phraseIdx.current = (phraseIdx.current + 1) % phrases.length;
        }
      }
      timeout = setTimeout(tick, deleting.current ? 40 : 70);
    };
    timeout = setTimeout(tick, 600);
    const cursorInterval = setInterval(() => setShowCursor(v => !v), 530);
    return () => { clearTimeout(timeout); clearInterval(cursorInterval); };
  }, []);

  return (
    <section id="hero" style={{
      minHeight: '100vh', display: 'flex', alignItems: 'center',
      padding: '0 clamp(1.5rem, 8vw, 10rem)',
      position: 'relative', overflow: 'hidden',

        position: 'absolute', inset: 0,
        backgroundImage: `linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px)`,

        opacity: 0.25,
        maskImage: 'radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%)',
      }} />
      {/* Shooting stars */}
      <div className="shooting-star" />
      <div className="shooting-star" />
      <div className="shooting-star" />
      {/* Cyber Globe */}
      <CyberGlobe accent={accent} />

      <div style={{ position: 'relative', maxWidth: '800px' }}>
        <div style={{
          fontFamily: 'var(--font-mono)', fontSize: '13px',
          color: accent, letterSpacing: '0.1em', marginBottom: '1.5rem',
          display: 'flex', alignItems: 'center', gap: '0.5rem',
        }}>
          <span style={{ width: 6, height: 6, borderRadius: '50%', background: accent, display: 'inline-block', boxShadow: `0 0 8px ${accent}` }} />
          DISPONIBILE PER NUOVE OPPORTUNITÀ
        </div>

        <h1 style={{
          fontSize: 'clamp(3rem, 8vw, 6rem)',
          fontWeight: 700, lineHeight: 1.05,
          letterSpacing: '-0.02em',
          marginBottom: '1rem',
        }}>
          Riccardo<br />
          <span style={{ color: accent }}>Civiero</span>
        </h1>

        <div style={{
          fontFamily: 'var(--font-mono)', fontSize: 'clamp(1rem, 2.5vw, 1.4rem)',
          color: 'var(--text2)', marginBottom: '2rem',
          minHeight: '2em',
        }}>
          <span style={{ color: 'var(--text3)' }}>$ </span>
          {typed}
          <span style={{ opacity: showCursor ? 1 : 0, color: accent }}>▌</span>
        </div>

        <p style={{
          fontSize: '1.05rem', color: 'var(--text2)',
          maxWidth: '520px', lineHeight: 1.7, marginBottom: '2.5rem',
        }}>
          Specializzato in Cybersecurity e sviluppo software, con esperienza in ambienti cloud, reti e sicurezza web. Attualmente @ ReputationUP.
        </p>

        <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap', alignItems: 'center' }}>
          <button onClick={() => document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' })} style={{
            padding: '0.75rem 1.75rem',
            background: accent, color: '#0a0c0f',
            border: 'none', borderRadius: '6px',
            fontFamily: 'var(--font-display)', fontSize: '14px', fontWeight: 600,
            cursor: 'pointer', letterSpacing: '0.03em',
            transition: 'transform 0.15s, box-shadow 0.15s',

            onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = `0 4px 24px ${accent}60`; }}

            Contattami →
          </button>
        </div>

        {/* Stats */}
        <div style={{ display: 'flex', gap: '2.5rem', marginTop: '3.5rem', flexWrap: 'wrap' }}>
          {[
            { n: '2+', label: 'Anni di esperienza IT' },
            { n: '4+', label: 'Aziende' },

            <div key={s.label}>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: '1.6rem', fontWeight: 700, color: accent }}>{s.n}</div>

              <div style={{ color: accent, flexShrink: 0 }}><Icon name={item.icon} size={18} /></div>

                  onBlur={e => e.target.style.borderColor = 'var(--border)'}
