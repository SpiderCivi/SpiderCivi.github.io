    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060809;
      --bg2: #0c0f14;
      --bg3: #131820;
      --border: #1a2230;
      --border2: #243040;
      --accent: #00e5a0;
      --accent2: #00b8ff;
      --accent3: #7c5cfc;
      --text: #e8edf4;
      --text2: #7a8898;
      --text3: #3a4858;
      --font-display: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      line-height: 1.6;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    #root { min-height: 100vh; }

    /* Grain */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9998; opacity: 0.5;
    }

    /* Scroll-reveal */
    .reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.85s cubic-bezier(0.16,1,0.3,1), transform 0.85s cubic-bezier(0.16,1,0.3,1); }
    .reveal.visible { opacity: 1; transform: none; }
    .reveal-left { opacity: 0; transform: translateX(-40px); transition: opacity 0.85s cubic-bezier(0.16,1,0.3,1), transform 0.85s cubic-bezier(0.16,1,0.3,1); }
    .reveal-left.visible { opacity: 1; transform: none; }
    .reveal-right { opacity: 0; transform: translateX(40px); transition: opacity 0.85s cubic-bezier(0.16,1,0.3,1), transform 0.85s cubic-bezier(0.16,1,0.3,1); }
    .reveal-right.visible { opacity: 1; transform: none; }
    .reveal-scale { opacity: 0; transform: scale(0.92); transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1); }
    .reveal-scale.visible { opacity: 1; transform: scale(1); }

    /* Delay helpers */
    .d1 { transition-delay: 0.1s; }
    .d2 { transition-delay: 0.2s; }
    .d3 { transition-delay: 0.3s; }
    .d4 { transition-delay: 0.4s; }
    .d5 { transition-delay: 0.5s; }

    /* Section label */
    .section-label {
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em;
      color: var(--text3); text-transform: uppercase; margin-bottom: 1.2rem;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .section-label::before {
      content: ''; width: 24px; height: 1px; background: var(--text3);
    }

    /* Skill pill */
    .skill-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border: 1px solid var(--border);
      border-radius: 100px; font-family: var(--font-mono);
      font-size: 12px; color: var(--text2); background: var(--bg2);
      transition: all 0.2s; cursor: default;
      white-space: nowrap;
    }
    .skill-pill:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.04); }

    /* Timeline line */
    .timeline-line {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 1px; background: linear-gradient(to bottom, transparent, var(--border2) 15%, var(--border2) 85%, transparent);
    }

    /* Card hover */
    .card-hover {
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1), box-shadow 0.35s ease, border-color 0.2s;
    }
    .card-hover:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    /* Glow text */
    .glow { text-shadow: 0 0 40px currentColor; }

    /* Progress bar */
    .progress-track {
      height: 3px; background: var(--border);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 2px;
      transform-origin: left; transform: scaleX(0);
      transition: transform 1.2s cubic-bezier(0.16,1,0.3,1);
    }
    .progress-fill.animated { transform: scaleX(1); }

    /* Contact form inputs */
    .form-input {
      width: 100%; padding: 12px 16px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: var(--font-display); font-size: 14px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      resize: vertical;
    }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,160,0.08); }
    .form-input::placeholder { color: var(--text3); }

    /* Cert card */
    .cert-card {
      padding: 20px; border: 1px solid var(--border);
      border-radius: 12px; background: var(--bg2);
      transition: all 0.25s; cursor: default;
    }
    .cert-card:hover { border-color: var(--accent2); background: rgba(0,184,255,0.03); transform: translateY(-2px); }

    /* Intro splash */
    #intro-splash {
      position: fixed; inset: 0; z-index: 99999;
      background: #060809;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 1.2s cubic-bezier(0.16,1,0.3,1), transform 1.2s cubic-bezier(0.16,1,0.3,1);
      overflow: hidden;
    }
    #intro-splash.fade-out {
      opacity: 0; transform: scale(1.03); pointer-events: none;
    }
    .intro-scanlines {
      position: absolute; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,229,160,0.012) 3px, rgba(0,229,160,0.012) 4px);
      animation: scanMove 8s linear infinite;
    }
    @keyframes scanMove { from { background-position: 0 0; } to { background-position: 0 100px; } }
    .intro-corner {
      position: absolute; width: 32px; height: 32px;
      border-color: #00e5a040; border-style: solid;
      opacity: 0; animation: introCornerIn 0.6s ease 0.4s forwards;
    }
    .intro-corner.tl { top: 2.5rem; left: 2.5rem; border-width: 1px 0 0 1px; }
    .intro-corner.tr { top: 2.5rem; right: 2.5rem; border-width: 1px 1px 0 0; }
    .intro-corner.bl { bottom: 2.5rem; left: 2.5rem; border-width: 0 0 1px 1px; }
    .intro-corner.br { bottom: 2.5rem; right: 2.5rem; border-width: 0 1px 1px 0; }
    @keyframes introCornerIn { to { opacity: 1; } }
    .intro-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: #3a4858;
      letter-spacing: 0.16em; text-transform: uppercase;
      opacity: 0; animation: introLogoIn 0.5s ease 0.5s forwards;
    }
    .intro-tag.top { position: absolute; top: 2.8rem; left: 50%; transform: translateX(-50%); }
    .intro-tag.bottom { position: absolute; bottom: 2.8rem; left: 50%; transform: translateX(-50%); }
    .intro-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 700;
      color: #e8edf4;
      letter-spacing: -0.04em;
      opacity: 0;
      transform: translateY(20px);
      animation: introLogoIn 0.9s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
      position: relative; z-index: 2;
    }
    .intro-logo span { color: #00e5a0; }
    .intro-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(11px, 1.5vw, 14px);
      color: #7a8898;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-top: 0.75rem;
      opacity: 0;
      transform: translateY(10px);
      animation: introLogoIn 0.7s cubic-bezier(0.16,1,0.3,1) 1.0s forwards;
    }
    .intro-divider {
      width: 1px; height: 0;
      background: linear-gradient(to bottom, transparent, #00e5a066, transparent);
      margin: 2rem auto;
      animation: introDivider 0.8s cubic-bezier(0.16,1,0.3,1) 1.3s forwards;

    .intro-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;

      letter-spacing: 0.20em;
      text-transform: uppercase;
      opacity: 0;
      animation: introLogoIn 0.6s ease 1.9s forwards;
      display: flex; align-items: center; gap: 1rem;
    }
    .intro-sub::before, .intro-sub::after {
      content: ''; display: inline-block;
      width: 20px; height: 1px; background: #1a2230;
    }
    .intro-bar-wrap {
      width: clamp(100px, 16vw, 180px);
      height: 1px;
      background: #1a2230;
      margin-top: 2.5rem;
      overflow: hidden;
      opacity: 0;
      animation: introLogoIn 0.4s ease 2.2s forwards;
    }
    .intro-bar {
      height: 100%;
      background: linear-gradient(90deg, transparent, #00e5a0, #00b8ff, transparent);
      width: 0;
      animation: introBar 1.8s cubic-bezier(0.16,1,0.3,1) 2.4s forwards;
    }
    .intro-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: #3a4858;
      letter-spacing: 0.12em;
      margin-top: 0.6rem;
      opacity: 0;
      animation: introLogoIn 0.4s ease 2.4s forwards;
    }
    @keyframes introLogoIn {
      to { opacity: 1; transform: none; }
    }
    @keyframes introBar {
      to { width: 100%; }
    }

const IntroSplash = ({ onDone }) => {
  const [pct, setPct] = React.useState(0);
  React.useEffect(() => {
    // Count up percentage over ~2s starting at 2.4s
    const start = Date.now() + 2400;
    const dur   = 1800;
    const tick  = () => {
      const elapsed = Math.max(0, Date.now() - start);
      const p = Math.min(100, Math.round((elapsed / dur) * 100));
      setPct(p);
      if (p < 100) requestAnimationFrame(tick);
    };
    const raf = requestAnimationFrame(tick);
    // Fade out at 5s
    const timer = setTimeout(() => {
      const el = document.getElementById('intro-splash');
      if (el) {
        el.classList.add('fade-out');
        setTimeout(() => { el.style.display = 'none'; onDone(); }, 1300);
      }
    }, 5000);
    return () => { clearTimeout(timer); cancelAnimationFrame(raf); };
  }, []);

  return (
    <div id="intro-splash">

      <div className="intro-scanlines"/>

/* ════════════════════════════════════════════
   SHOOTING STARS
════════════════════════════════════════════ */
const ShootingStars = () => {
  const canvasRef = React.useRef(null);
  const animRef   = React.useRef(null);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;

    const resize = () => {
      canvas.width  = canvas.offsetWidth  * dpr;
      canvas.height = canvas.offsetHeight * dpr;
    };
    resize();
    window.addEventListener('resize', resize);

    let W = canvas.width, H = canvas.height;

    // Globe center/radius estimate (right half, roughly)
    const getGlobeArea = () => ({
      cx: W * 0.72,
      cy: H * 0.5,
      r: Math.min(W, H) * 0.38 * 1.25, // slightly larger than globe + margin
    });

    // Static star field
    const STARS = Array.from({length: 120}, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 0.2 + Math.random() * 0.9,
      a: 0.05 + Math.random() * 0.28,
      phase: Math.random() * Math.PI * 2,
      speed: 0.0002 + Math.random() * 0.0004,
    }));

    const shooters = [];
    let lastSpawn = -99999;
    const MIN_INTERVAL = 4500;
    const MAX_INTERVAL = 7000;
    let nextInterval = MIN_INTERVAL + Math.random() * (MAX_INTERVAL - MIN_INTERVAL);

    const spawnShooter = () => {
      const g = getGlobeArea();
      // Pick start point — try up to 10 times to avoid globe area
      let x, y, tries = 0;
      do {
        x = Math.random() * W * 0.85;
        y = Math.random() * H * 0.45;
        tries++;
      } while (tries < 10 && Math.hypot(x - g.cx, y - g.cy) < g.r);

      const angle = (Math.PI / 5) + Math.random() * (Math.PI / 7);
      const speed = (3.5 + Math.random() * 4.5) * dpr;
      const len   = (100 + Math.random() * 180) * dpr;

      // Check tail endpoint too — reject if path crosses globe
      const tx = x + Math.cos(angle) * (len + speed * 80);
      const ty = y + Math.sin(angle) * (len + speed * 80);
      if (Math.hypot(tx - g.cx, ty - g.cy) < g.r * 0.85) return;

      const life = (len / speed) * 2.2;
      const brightness = 0.65 + Math.random() * 0.35;
      const warm = Math.random() < 0.12;
      const hue = warm ? `rgba(255,220,170,` : `rgba(${195+Math.floor(Math.random()*60)},${215+Math.floor(Math.random()*40)},255,`;
      shooters.push({ x, y, angle, speed, len, life, age: 0, brightness, hue });
    };

    const draw = (ts) => {
      const canvas2 = canvasRef.current;
      if (!canvas2) return;
      W = canvas2.width; H = canvas2.height;
      ctx.clearRect(0, 0, W, H);

      // Static stars
      STARS.forEach(s => {
        const flicker = 0.5 + 0.5 * Math.sin(ts * s.speed + s.phase);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a * flicker})`;
        ctx.fill();
      });

      // Spawn — one at a time, ~every 5-7s
      if (ts - lastSpawn > nextInterval) {
        spawnShooter();
        lastSpawn = ts;
        nextInterval = MIN_INTERVAL + Math.random() * (MAX_INTERVAL - MIN_INTERVAL);
      }

      // Draw shooting stars
      for (let i = shooters.length - 1; i >= 0; i--) {
        const s = shooters[i];
        s.age++;
        const prog = s.age / s.life;
        if (prog >= 1) { shooters.splice(i, 1); continue; }

        const hx = s.x + Math.cos(s.angle) * s.speed * s.age;
        const hy = s.y + Math.sin(s.angle) * s.speed * s.age;

        let alpha = s.brightness;
        if (prog < 0.08) alpha *= prog / 0.08;
        else if (prog > 0.65) alpha *= 1 - (prog - 0.65) / 0.35;

        const tx2 = hx - Math.cos(s.angle) * s.len;
        const ty2 = hy - Math.sin(s.angle) * s.len;

        // Tail gradient
        const grad = ctx.createLinearGradient(tx2, ty2, hx, hy);
        grad.addColorStop(0,    `${s.hue}0)`);
        grad.addColorStop(0.45, `${s.hue}${(alpha * 0.15).toFixed(3)})`);
        grad.addColorStop(0.82, `${s.hue}${(alpha * 0.6).toFixed(3)})`);
        grad.addColorStop(1,    `${s.hue}${alpha.toFixed(3)})`);

        // Glow halo
        ctx.save();
        ctx.shadowColor = `rgba(200,230,255,${alpha * 0.5})`;
        ctx.shadowBlur  = 8 * dpr;
        ctx.beginPath(); ctx.moveTo(tx2, ty2); ctx.lineTo(hx, hy);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.4 * dpr;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Bright core
        ctx.shadowBlur = 0;
        const cl = s.len * 0.10;
        const cx2 = hx - Math.cos(s.angle) * cl;
        const cy2 = hy - Math.sin(s.angle) * cl;
        const cg  = ctx.createLinearGradient(cx2, cy2, hx, hy);
        cg.addColorStop(0, `rgba(255,255,255,0)`);
        cg.addColorStop(1, `rgba(255,255,255,${alpha * 0.9})`);
        ctx.beginPath(); ctx.moveTo(cx2, cy2); ctx.lineTo(hx, hy);
        ctx.strokeStyle = cg;
        ctx.lineWidth = 0.7 * dpr;
        ctx.stroke();

        // Head sparkle
        ctx.shadowColor = `rgba(255,255,255,${alpha})`;
        ctx.shadowBlur  = 14 * dpr;
        ctx.beginPath(); ctx.arc(hx, hy, 1.4 * dpr, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fill();
        ctx.restore();
      }

      animRef.current = requestAnimationFrame(draw);
    };

    animRef.current = requestAnimationFrame(draw);
    return () => {
      cancelAnimationFrame(animRef.current);
      window.removeEventListener('resize', resize);
    };
  }, []);

  return (
    <canvas
      ref={canvasRef}
      id="shooting-stars-canvas"
      style={{ position:'absolute', inset:0, width:'100%', height:'100%', pointerEvents:'none', zIndex:1 }}
    />
  );
};


const useScrollReveal = () => {
  React.useEffect(() => {
    const targets = document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });
    targets.forEach(t => obs.observe(t));
    return () => obs.disconnect();
  }, []);
};

      for (const x of arr) { r -= x.weight; if (r <= 0) return x; }

    const toRad = d => d * Math.PI / 180;
    const hex2rgb = h => { const c=h.replace('#',''); return [parseInt(c.slice(0,2),16),parseInt(c.slice(2,4),16),parseInt(c.slice(4,6),16)]; };
    const [ar,ag,ab] = hex2rgb(accent);

    const project = (lat, lon, rot) => {
      const phi=toRad(90-lat), theta=toRad(lon)+rot, sinP=Math.sin(phi);
      const x=R*sinP*Math.cos(theta), y=R*Math.cos(phi), z=R*sinP*Math.sin(theta);

    const draw = (ts) => {
      ctx.clearRect(0,0,W,H);

      // ── OUTER ATMOSPHERE GLOW ──

      ALL_NODES.forEach((node, i) => {

        } else if(isSource) {

        if(!anyVis){if(atk.progress>=1.6)state.attacks.splice(i,1);continue;}

        // Build a single continuous path of visible segments
        // Single subtle glow pass (thin, not fat)
        ctx.save();
        ctx.shadowColor=atk.color;
        ctx.shadowBlur=8;
        ctx.beginPath();
        let drawing=false;
        for(let s=0;s<pts.length;s++){
          const p=pts[s];
          if(p.z<=0){drawing=false;continue;}
          const fadeIn=s/(pts.length-1);
          const alpha=fadeIn*0.55;
          if(!drawing){ctx.moveTo(p.x,p.y);drawing=true;}

        ctx.lineJoin='round';

        ctx.save();
        ctx.lineCap='round'; ctx.lineJoin='round';
        let prevP=null;
        for(let s=0;s<pts.length-1;s++){
          const p=pts[s], pn=pts[s+1];

          const t=s/(pts.length-1);

          ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(pn.x,pn.y);
          ctx.strokeStyle='rgba('+r2+','+g2+','+b2+','+alpha.toFixed(2)+')';
          ctx.lineWidth=1.0*dpr;

        if(atk.progress<1){
          const head=arcPoint(atk.src,atk.dst,atk.progress,rot);
          if(head.z>0){
            const fo=1-Math.max(0,(atk.progress-0.88)/0.12);
            ctx.save();
            ctx.shadowColor=atk.color; ctx.shadowBlur=16;
            ctx.beginPath(); ctx.arc(head.x,head.y,3.5*dpr,0,Math.PI*2);
            ctx.fillStyle='rgba('+r2+','+g2+','+b2+','+fo+')'; ctx.fill();
            ctx.shadowBlur=0;
            ctx.beginPath(); ctx.arc(head.x,head.y,1.4*dpr,0,Math.PI*2);
            ctx.fillStyle='rgba(255,255,255,'+(fo*0.95)+')'; ctx.fill();
            ctx.restore();
          }
        }
        if(atk.progress>=1&&!atk.impacted){
          atk.impacted=true;
          const dst=project(atk.dst.lat,atk.dst.lon,rot);
          state.impacts.push({x:dst.x,y:dst.y,color:atk.color,age:0});
        }
        if(atk.progress>=1.6) state.attacks.splice(i,1);
      }

      // ── IMPACTS — clean, subtle ──
      for(let i=state.impacts.length-1;i>=0;i--){
        const imp=state.impacts[i]; imp.age++;
        const [r2,g2,b2]=hex2rgb(imp.color);
        ctx.save(); ctx.shadowColor=imp.color; ctx.shadowBlur=8;
        for(let ring=0;ring<3;ring++){
          const t=((imp.age/55)+ring*0.33)%1;
          const ringR=t*28*dpr, alpha=(1-t)*0.75;
          ctx.beginPath(); ctx.arc(imp.x,imp.y,ringR,0,Math.PI*2);
          ctx.strokeStyle='rgba('+r2+','+g2+','+b2+','+alpha+')';
          ctx.lineWidth=0.9*dpr; ctx.stroke();
        }
        ctx.restore(); if(imp.age>55) state.impacts.splice(i,1);
      }

      // ── HUD — real threat intelligence data ──
      const count=state.attacks.length;
      const atkType=state.currentType||'DDoS';
      const fs=9*dpr;
      ctx.font='600 '+fs+'px JetBrains Mono, monospace';
      const label=' LIVE ATTACKS: '+String(count).padStart(2,'0')+'   TYPE: '+atkType;
      const tw=ctx.measureText(label).width;
      const hx=cx-tw/2-14*dpr, hy=cy+R+14*dpr, hw=tw+28*dpr, hh=22*dpr;
      // Background
      ctx.fillStyle='rgba(2,5,14,0.88)';
      ctx.beginPath();
      if(ctx.roundRect) ctx.roundRect(hx,hy,hw,hh,4*dpr); else ctx.rect(hx,hy,hw,hh);
      ctx.fill();
      // Border
      ctx.strokeStyle='rgba('+ar+','+ag+','+ab+',0.25)'; ctx.lineWidth=0.6; ctx.stroke();
      // Dot indicator
      ctx.beginPath(); ctx.arc(hx+10*dpr, hy+hh/2, 3*dpr, 0, Math.PI*2);
      ctx.fillStyle='rgba('+ar+','+ag+','+ab+',0.9)'; ctx.fill();
      // Text
      ctx.fillStyle='rgba('+ar+','+ag+','+ab+',0.85)';
      ctx.fillText(label, hx+18*dpr, hy+15*dpr);
      // Source attribution (small)
      const src2='SOURCE: CLOUDFLARE RADAR / CISA 2025';
      const fs2=7.5*dpr;
      ctx.font='400 '+fs2+'px JetBrains Mono, monospace';
      const sw=ctx.measureText(src2).width;
      ctx.fillStyle='rgba('+ar+','+ag+','+ab+',0.28)';
      ctx.fillText(src2, cx-sw/2, hy+hh+12*dpr);

      animRef.current=requestAnimationFrame(draw);
    };
    animRef.current=requestAnimationFrame(draw);
    return () => cancelAnimationFrame(animRef.current);
  }, [accent]);

  const onDown = e => { dragRef.current.active=true; dragRef.current.lastX=e.clientX; stateRef.current.velocity=0; };
  const onMove = e => {
    if (!dragRef.current.active) return;
    const dx=e.clientX-dragRef.current.lastX; dragRef.current.lastX=e.clientX;
    stateRef.current.velocity=dx*0.003; stateRef.current.rotation+=dx*0.003;
  };
  const onUp = () => { dragRef.current.active=false; };

  return (
    <canvas ref={canvasRef}
      onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
      style={{
        position:'absolute', top:'50%', right:'-3%',
        transform:'translateY(-50%)',
        width:'min(580px,52vw)', height:'min(640px,58vw)',
        cursor:'grab', opacity:0.97,
        WebkitMaskImage:'radial-gradient(ellipse 78% 82% at 60% 50%, black 30%, transparent 100%)',
        maskImage:'radial-gradient(ellipse 78% 82% at 60% 50%, black 30%, transparent 100%)',
      }}
    />
  );
};

const Nav = ({ accent, lang, setLang }) => {
  const [scrolled, setScrolled] = React.useState(false);
  const [active, setActive]     = React.useState('hero');
  React.useEffect(()=>{
    let ticking = false;
    const onScroll=()=>{
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        setScrolled(window.scrollY>50);
        const secs=['hero','about','skills','experience','education','contact'];
        for (const id of [...secs].reverse()) {
          const el=document.getElementById(id);
          if (el&&window.scrollY>=el.offsetTop-130) { setActive(id); break; }
        }
        ticking = false;
      });
    };
    window.addEventListener('scroll',onScroll,{passive:true});
    return ()=>window.removeEventListener('scroll',onScroll);
  },[]);
  const scrollTo = id => { const el=document.getElementById(id); if(el) window.scrollTo({top:el.offsetTop-80,behavior:'smooth'}); };
  const nav = T[lang]?.nav || T.en.nav;
  const items=[{id:'about',label:nav.about},{id:'skills',label:nav.skills},{id:'experience',label:nav.experience},{id:'education',label:nav.education},{id:'contact',label:nav.contact}];
  return (
    <nav style={{
      position:'fixed',top:0,left:0,right:0,zIndex:1000,
      padding:'0 clamp(1.5rem,5vw,4rem)',
      background: scrolled?'rgba(6,8,9,0.94)':'transparent',
      backdropFilter: scrolled?'blur(16px)':'none',
      borderBottom: scrolled?'1px solid var(--border)':'1px solid transparent',
      transition:'all 0.35s ease', height:'62px',
      display:'flex',alignItems:'center',justifyContent:'space-between',
    }}>
      <button onClick={()=>scrollTo('hero')} style={{ background:'none',border:'none',cursor:'pointer',fontFamily:'var(--font-mono)',fontSize:'14px',color:accent,letterSpacing:'0.06em',fontWeight:600 }}>
        RC<span style={{color:'var(--text3)'}}>._</span>
      </button>
      <div style={{display:'flex',gap:'2rem',alignItems:'center'}}>
        {items.map(item=>(
          <button key={item.id} onClick={()=>scrollTo(item.id)} style={{
            background:'none',border:'none',cursor:'pointer',
            fontFamily:'var(--font-display)',fontSize:'13px',fontWeight:500,
            color: active===item.id ? accent : 'var(--text2)',
            letterSpacing:'0.02em', transition:'color 0.2s', padding:0,
          }}>{item.label}</button>
        ))}
        <LangSwitcher lang={lang} setLang={setLang} accent={accent} />

  );
};

/* Replace with your real Cloudflare Turnstile site key from https://dash.cloudflare.com/turnstile */
const TURNSTILE_SITE_KEY = '0x4AAAAAADK2uMk-m_jmhFjh'; // Cloudflare Turnstile site key

const BLOCKED_DOMAINS = new Set([
  'mailinator.com','guerrillamail.com','tempmail.com','throwam.com','yopmail.com',
  'maildrop.cc','sharklasers.com','guerrillamail.info','guerrillamail.biz',
  'guerrillamail.de','guerrillamail.net','guerrillamail.org','spam4.me',
  'trashmail.com','trashmail.me','trashmail.at','dispostable.com','mailnull.com',
  'spamgourmet.com','trashmail.io','fakeinbox.com','getnada.com','tempinbox.com',
  'discard.email','harakirimail.com','sogetthis.com','spamherelots.com',
  'mailexpire.com','spam.la','trashmail.net','mintemail.com','spamex.com',
]);

const isValidEmail = (email) => {
  if (!email || email.length > 254) return false;
  const re = /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*\.[a-zA-Z]{2,}$/;
  if (!re.test(email)) return false;
  const domain = email.split('@')[1].toLowerCase();
  if (BLOCKED_DOMAINS.has(domain)) return false;
  const parts = domain.split('.');
  if (parts.some(p => p.length === 0)) return false;
  return true;
};

const sanitize = (str, maxLen) => String(str).replace(/[<>]/g, '').trim().slice(0, maxLen);

const checkRateLimit = () => {
  const key = 'cf_submissions';
  const maxPerHour = 3;
  const windowMs = 3600000;
  const now = Date.now();
  let history = [];
  try { history = JSON.parse(localStorage.getItem(key) || '[]'); } catch {}
  history = history.filter(t => now - t < windowMs);
  if (history.length >= maxPerHour) return false;
  history.push(now);
  try { localStorage.setItem(key, JSON.stringify(history)); } catch {}
  return true;
};

const Contact = ({ accent, lang }) => {
  const tl = T[lang]||T.en;
  const [form, setForm] = React.useState({name:'',email:'',message:''});
  const [status, setStatus] = React.useState('');
  const [errors, setErrors] = React.useState({});
  const [turnstileToken, setTurnstileToken] = React.useState('');
  const turnstileRef = React.useRef(null);
  const widgetIdRef = React.useRef(null);

  React.useEffect(() => {
    const el = turnstileRef.current;
    if (!el) return;
    const tryRender = () => {
      if (window.turnstile) {
        widgetIdRef.current = window.turnstile.render(el, {
          sitekey: TURNSTILE_SITE_KEY,
          theme: 'dark',
          callback: token => setTurnstileToken(token),
          'expired-callback': () => setTurnstileToken(''),
          'error-callback': () => setTurnstileToken(''),
        });
      } else {
        setTimeout(tryRender, 150);
      }
    };
    tryRender();
    return () => {
      if (widgetIdRef.current !== null && window.turnstile) {
        try { window.turnstile.remove(widgetIdRef.current); } catch {}
      }
    };
  }, []);

  const validate = () => {
    const errs = {};
    const name = sanitize(form.name, 100);
    const email = sanitize(form.email, 254);
    const message = sanitize(form.message, 5000);
    if (!name || name.length < 2) errs.name = 'Nome troppo corto (min 2 caratteri)';
    if (!isValidEmail(email)) errs.email = 'Inserisci un\'email valida e reale';
    if (!message || message.length < 5) errs.message = 'Messaggio troppo corto (min 5 caratteri)';
    return errs;
  };

  const handleSubmit = e => {
    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length > 0) { setErrors(errs); return; }
    setErrors({});

    if (!checkRateLimit()) {
      setErrors({ global: 'Troppi messaggi inviati. Riprova tra un\'ora.' });
      return;
    }

    if (!turnstileToken) {
      setErrors({ global: 'Completa la verifica anti-bot prima di inviare.' });
      return;
    }

    setStatus('sending');
    const cleanName = sanitize(form.name, 100);
    const cleanEmail = sanitize(form.email, 254);
    const cleanMsg = sanitize(form.message, 5000);

    emailjs.send(
      'service_kfj4ure',
      'template_h0u9r3e',
      {
        from_name:   cleanName,
        user_name:   cleanName,
        name:        cleanName,
        from_email:  cleanEmail,
        user_email:  cleanEmail,
        email:       cleanEmail,
        reply_to:    cleanEmail,
        message:     cleanMsg,
        to_name:     'Riccardo',
        subject:     `Contatto da ${cleanName} (${cleanEmail})`,
      }
    ).then(() => {
      setStatus('sent');
      setForm({name:'',email:'',message:''});
      if (widgetIdRef.current !== null && window.turnstile) {
        try { window.turnstile.reset(widgetIdRef.current); } catch {}
      }
      setTurnstileToken('');
      setTimeout(()=>setStatus(''),5000);
    }).catch((err) => {
      console.error('EmailJS error:', err);
      setStatus('error');
      setTimeout(()=>setStatus(''),5000);
    });
  };

  const inputBorder = (key) => errors[key] ? '1px solid #f43f5e' : '1px solid var(--border)';

  return (
    <section id="contact" style={{ padding:'clamp(6rem,12vh,10rem) clamp(1.5rem,8vw,10rem)', background:'var(--bg2)', borderTop:'1px solid var(--border)' }}>
      <div style={{ maxWidth:'900px', margin:'0 auto' }}>
        <p className="section-label reveal">{tl.contactTitle}</p>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'5rem', alignItems:'start' }}>
          {/* Left */}
          <div>
            <h2 className="reveal d1" style={{ fontSize:'clamp(2rem,4vw,3rem)', fontWeight:700, letterSpacing:'-0.02em', lineHeight:1.15, marginBottom:'1.5rem' }}>
              {tl.contactTitle}
            </h2>
            <p className="reveal d2" style={{ fontSize:'1rem', color:'var(--text2)', lineHeight:1.8, marginBottom:'2.5rem' }}>
              {tl.contactDesc}
            </p>
            <div className="reveal d3" style={{ display:'flex', flexDirection:'column', gap:'1rem' }}>
              {[
                { icon:'mail', label:'Email', val:DATA.email, href:`mailto:${DATA.email}` },
                { icon:'location', label:'Location', val:DATA.location, href:null },
              ].map(row=>(
                <div key={row.label} style={{ display:'flex', alignItems:'center', gap:'14px', padding:'16px 18px', background:'var(--bg)', border:'1px solid var(--border)', borderRadius:'10px' }}>
                  <div style={{ width:36,height:36,borderRadius:'8px',background:`${accent}18`,display:'flex',alignItems:'center',justifyContent:'center',color:accent,flexShrink:0 }}>
                    <Icon name={row.icon} size={16}/>
                  </div>
                  <div>
                    <div style={{ fontFamily:'var(--font-mono)', fontSize:'10px', color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.1em', marginBottom:'2px' }}>{row.label}</div>
                    {row.href
                      ? <a href={row.href} style={{ fontSize:'13px', color:'var(--text)', textDecoration:'none', fontWeight:500 }} onMouseEnter={e=>e.currentTarget.style.color=accent} onMouseLeave={e=>e.currentTarget.style.color='var(--text)'}>{row.val}</a>
                      : <span style={{ fontSize:'13px', color:'var(--text)', fontWeight:500 }}>{row.val}</span>
                    }
                  </div>
                </div>
              ))}
            </div>
            <div className="reveal d4" style={{ marginTop:'2rem', display:'flex', gap:'0.75rem' }}>
              {DATA.links.map(l=>(
                <a key={l.label} href={l.url} target="_blank" rel="noreferrer" style={{
                  padding:'10px 20px', border:'1px solid var(--border)', borderRadius:'8px',
                  fontFamily:'var(--font-mono)', fontSize:'12px', color:'var(--text2)', textDecoration:'none',
                  display:'flex', alignItems:'center', gap:'6px', transition:'all 0.2s',
                }}
                  onMouseEnter={e=>{ e.currentTarget.style.borderColor=accent; e.currentTarget.style.color=accent; }}
                  onMouseLeave={e=>{ e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--text2)'; }}
                ><Icon name="link" size={12}/>{l.label}</a>
              ))}
            </div>
          </div>
          {/* Form */}
          <form onSubmit={handleSubmit} className="reveal d2" style={{ display:'flex', flexDirection:'column', gap:'1rem' }} noValidate>
            <p style={{ fontFamily:'var(--font-mono)', fontSize:'11px', color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.12em', marginBottom:'0.5rem' }}>{tl.formTitle}</p>
            {errors.global && (
              <div style={{ padding:'10px 14px', background:'rgba(244,63,94,0.08)', border:'1px solid #f43f5e', borderRadius:'8px', color:'#f43f5e', fontSize:'13px' }}>
                {errors.global}
              </div>
            )}
            {[
              { key:'name', label:tl.fName, ph:tl.fNamePh, type:'text', maxLength:100 },
              { key:'email', label:tl.fEmail, ph:tl.fEmailPh, type:'email', maxLength:254 },
            ].map(f=>(
              <div key={f.key}>
                <label style={{ display:'block', fontFamily:'var(--font-mono)', fontSize:'11px', color: errors[f.key] ? '#f43f5e' : 'var(--text3)', textTransform:'uppercase', letterSpacing:'0.1em', marginBottom:'6px' }}>{f.label}</label>
                <input type={f.type} placeholder={f.ph} value={form[f.key]} maxLength={f.maxLength}
                  onChange={e=>{ setForm({...form,[f.key]:e.target.value}); setErrors(prev=>({...prev,[f.key]:''})); }}
                  className="form-input" style={{ border: inputBorder(f.key) }}
                />
                {errors[f.key] && <p style={{ marginTop:'4px', fontSize:'11px', color:'#f43f5e', fontFamily:'var(--font-mono)' }}>{errors[f.key]}</p>}
              </div>
            ))}
            <div>
              <label style={{ display:'block', fontFamily:'var(--font-mono)', fontSize:'11px', color: errors.message ? '#f43f5e' : 'var(--text3)', textTransform:'uppercase', letterSpacing:'0.1em', marginBottom:'6px' }}>{tl.fMsg}</label>
              <textarea rows={5} placeholder={tl.fMsgPh} value={form.message} maxLength={5000}
                onChange={e=>{ setForm({...form,message:e.target.value}); setErrors(prev=>({...prev,message:''})); }}
                className="form-input" style={{ border: inputBorder('message') }}
              />
              {errors.message && <p style={{ marginTop:'4px', fontSize:'11px', color:'#f43f5e', fontFamily:'var(--font-mono)' }}>{errors.message}</p>}
            </div>
            {/* Cloudflare Turnstile widget */}
            <div ref={turnstileRef} style={{ minHeight:'65px' }}></div>
            <button type="submit" disabled={status==='sending'} style={{
              padding:'14px',
              background: status==='sent' ? 'var(--bg2)' : status==='error' ? 'rgba(244,63,94,0.1)' : status==='sending' ? 'var(--bg2)' : accent,
              color: status==='sent' ? accent : status==='error' ? '#f43f5e' : status==='sending' ? 'var(--text2)' : '#060809',
              border: (status==='sent'||status==='sending') ? '1px solid '+(status==='sent'?accent:'var(--border)') : status==='error' ? '1px solid #f43f5e' : 'none',
              borderRadius:'8px', fontFamily:'var(--font-display)', fontSize:'14px',
              fontWeight:700, cursor: status==='sending'?'not-allowed':'pointer', letterSpacing:'0.02em',
              transition:'all 0.3s', boxShadow: (!status) ? '0 0 24px rgba(0,229,160,0.2)' : 'none',
              opacity: status==='sending' ? 0.7 : 1,
            }}>
              {status==='sent' ? '✓ Messaggio inviato!' : status==='sending' ? '⏳ Invio in corso...' : status==='error' ? '✕ Errore — riprova' : tl.fSend}
            </button>
          </form>
        </div>
      </div>
    </section>
  );
};
